<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Воспоминания</title>
<!-- Подключение шрифта с Google Fonts (замените на свой, если нужно) -->
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Francois+One&family=Lilita+One&display=swap" rel="stylesheet">

<style>
  /* Общие стили для тела страницы */
  body {
    margin: 0;
    font-family: "Lilita One", sans-serif;
    background: url('images/rose.jpg') no-repeat center center;
    background-size: cover;
    min-height: 100vh;
    padding: 10px;
  }

  /* Обертка для центрирования текста по экрану */
  .central-container {
    position: fixed; /* чтобы фиксировать по экрану */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex; /* используем флекс для центрирования */
    justify-content: center; /* по горизонтали */
    align-items: center; /* по вертикали */
    z-index: 999; /* поверх всего */
    background: transparent; /* прозрачный фон */
  }

  /* Стиль текста "MEMORIES" */
  .central-text {
    font-size: 6em;
    color: white; /* чтобы было видно на фоне */
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7); /* тень для читаемости */
    opacity: 1; /* полностью видимо */
    /* Можно оставить анимацию, если хотите эффект появления */
  }

  /* Контейнер для изображений и другого контента */
  .container {
    position: relative;
    max-width: 1200px;
    width: 100%;
    padding: 20px;
    box-sizing: border-box;
  }

  /* Анимация появления текста (можно оставить или убрать) */
  @keyframes fadeInDown {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Стиль для строк с изображениями */
  .images-row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
  }

  /* Стиль изображений */
  .images-row img {
    cursor: pointer;
    border: 2px solid #ccc;
    border-radius: 8px;
    object-fit: cover;
    transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    width: 250px;
    height: 150px;
  }

  /* Эффект при наведении */
  .images-row img:hover {
    border-color: #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
    transform: scale(1.05);
  }

  /* Модальное окно */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 10px;
  }

  /* Контент модального окна */
  .modal-content {
    background: #a80000;
    padding: 20px;
    border-radius: 10px;
    max-width: 90%;
    width: 400px;
    box-sizing: border-box;
    text-align: center;
  }

  /* Поле ввода */
  .modal input[type="password"] {
    width: 80%;
    padding: 10px;
    margin-top: 15px;
    font-size: 1em;
    border: 1px solid #d60000;
    border-radius: 4px;
    box-sizing: border-box;
  }

  /* Кнопки */
  .modal button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 1em;
    cursor: pointer;
    border: none;
    background-color: #ffffff;
    color: rgb(136, 0, 0);
    border-radius: 4px;
    transition: background 0.3s;
  }

  /* Ховер для кнопки */
  .modal button:hover {
    background-color: #e2000086;
  }

  /* Медиазапросы для мобильных устройств */
  @media(max-width: 768px) {
    .central-text {
      font-size: 4em;
      margin-bottom: 50px;
    }
    .images-row img {
      width: 200px;
      height: 120px;
    }
    .modal input[type="password"] {
      width: 100%;
    }
    .modal button {
      width: 100%;
      padding: 10px 0;
    }
    .container {
      padding: 10px;
    }
  }

  @media(max-width: 480px) {
    .central-text {
      font-size: 3em;
    }
    .images-row img {
      width: 150px;
      height: 80px;
    }
  }
</style>
</head>
<body>

<!-- Обертка для центрации текста "MEMORIES" -->
<div class="central-container">
  <div class="central-text" id="centralText">MEMORIES</div>
</div>

<!-- Остальной контент остается без изменений -->
<div class="container">
  <!-- Можно оставить или убрать, если нужен только центрированный текст -->
  <!-- Тут ваш код с изображениями и т.д. -->
  <!-- Например, добавлю ваши изображения ниже, чтобы сохранить структуру -->
  <!-- Верхние большие картинки -->
  <div class="images-row">
    <img src="images/n1.jpg" data-link="story1.html" data-password="The black rose" class="big-img" alt="Она мертва" />
    <img src="images/n2.jpg" data-link="story2.html" data-password="Existence" class="big-img" alt="Люди" />
    <img src="images/n3.jpg" data-link="story3.html" data-password="Flowers" class="big-img" alt="Ненавижу" />
  </div>

  <!-- Нижние одинакового размера картинки -->
  <div class="images-row" style="margin-top:30px;">
    <img src="images/un.jpg" data-link="story4.html" data-password="парольA" class="small-img" alt="Маленькая 1" />
    <img src="images/un.jpg" data-link="story5.html" data-password="парольB" class="small-img" alt="Маленькая 2" />
    <img src="images/un.jpg" data-link="story6.html" data-password="парольC" class="small-img" alt="Маленькая 3" />
  </div>
</div>

<!-- Модальное окно для ввода кода -->
<div class="modal" id="codeModal">
  <div class="modal-content">
    <h3>Нужен пароль.</h3>
    <input type="password" id="codeInput" placeholder="Код" />
    <div style="margin-top:15px;">
      <button id="submitCode">Подтвердить</button>
      <button id="cancel" style="background-color:#f44336; margin-left:10px;">Отмена</button>
    </div>
  </div>
</div>

<script>
  const modal = document.getElementById('codeModal');
  const codeInput = document.getElementById('codeInput');
  let currentLink = '';
  let currentPassword = '';

  function setupImageClick(img) {
    img.addEventListener('click', () => {
      currentLink = img.dataset.link;
      currentPassword = img.dataset.password;
      openCodeModal();
    });
  }

  function openCodeModal() {
    modal.style.display = 'flex';
    codeInput.value = '';
    codeInput.focus();

    // Обнуляем обработчик, чтобы не накапливать
    document.getElementById('submitCode').onclick = () => {
      if (codeInput.value === currentPassword) {
        window.location.href = currentLink;
      } else {
        alert('Неверный код!');
      }
    };
  }

  // Инициализация для всех изображений
  document.querySelectorAll('.big-img').forEach(img => {
    setupImageClick(img);
  });
  document.querySelectorAll('.small-img').forEach(img => {
    setupImageClick(img);
  });

  document.getElementById('cancel').onclick = () => {
    modal.style.display = 'none';
  };

  window.onclick = (event) => {
    if (event.target == modal) {
      modal.style.display = 'none';
    }
  };
</script>

</body>
</html>
