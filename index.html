<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Воспоминания</title>
<!-- Подключение шрифта -->
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: "Lilita One", sans-serif;
    background: url('images/rose.jpg');
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    color: black;
  }

  /* Заголовок */
  #centralText {
    font-size: 6em;
    margin-bottom: 90px;
    opacity: 0;
    transform: translateY(-20px);
    animation: fadeInDown 2s forwards;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    text-align: center;
  }

  @keyframes fadeInDown {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Контейнер с изображениями */
  .content-container {
    width: 100%;
    max-width: 1200px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Ряды изображений */
  .images-row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    width: 100%;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Размеры и эффекты изображений */
  .images-row img {
    cursor: pointer;
    border: 2px solid #ccc;
    border-radius: 8px;
    object-fit: cover;
    width: 250px;
    height: 150px;
    max-width: 100%;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s, filter 0.3s;
  }

  /* Плавный переход при наведении */
  .images-row img:hover {
    border-color: #fff;
    box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    transform: scale(1.05);
    filter: brightness(1.1);
  }

  /* Модальное окно для ввода */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    justify-content: center;
    align-items: center;
    z-index: 9999;
    backdrop-filter: blur(4px);
  }

  .modal-content {
    background: #a80000;
    padding: 20px;
    border-radius: 10px;
    width: 80%;
    max-width: 400px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transform: scale(0.8);
    opacity: 0;
    animation: popIn 0.3s forwards;
    text-align: center;
  }

  @keyframes popIn {
    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  #codeInput {
    width: 80%;
    padding: 10px;
    margin-top: 15px;
    font-size: 1em;
    border: 1px solid #d60000;
    border-radius: 4px;
  }

  .modal button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 1em;
    cursor: pointer;
    border: none;
    background-color: #ffffff;
    color: rgb(136, 0, 0);
    border-radius: 4px;
    transition: background 0.3s, transform 0.2s;
  }

  .modal button:hover {
    background-color: #e2000086;
    transform: scale(1.05);
  }

  /* Адаптивность */
  @media(max-width: 600px) {
    #centralText {
      font-size: 10vw;
    }
    .images-row img {
      max-width: 150px;
      height: auto;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="central-text" id="centralText">MEMORIES</div>
  
  <!-- Верхние большие картинки -->
  <div class="images-row">
    <img src="images/n1.jpg" data-link="story1.html" data-password="The black rose" alt="Она мертва" />
    <img src="images/n2.jpg" data-link="story2.html" data-password="Existence" alt="Люди" />
    <img src="images/n3.jpg" data-link="story3.html" data-password="Flowers" alt="Ненавижу" />
  </div>

  <!-- Нижние маленькие картинки -->
  <div class="images-row" style="margin-top:30px;">
    <img src="images/un.jpg" data-link="story4.html" data-password="парольA" alt="Маленькая 1" />
    <img src="images/un.jpg" data-link="story5.html" data-password="парольB" alt="Маленькая 2" />
    <img src="images/un.jpg" data-link="story6.html" data-password="парольC" alt="Маленькая 3" />
  </div>
</div>

<!-- Модальное окно для ввода кода -->
<div class="modal" id="codeModal">
  <div class="modal-content">
    <h3>Нужен пароль.</h3>
    <input type="password" id="codeInput" placeholder="Код" />
    <div style="margin-top:15px;">
      <button id="submitCode">Подтвердить</button>
      <button id="cancel" style="background-color:#f44336; margin-left:10px;">Отмена</button>
    </div>
  </div>
</div>

<script>
  const modal = document.getElementById('codeModal');
  const codeInput = document.getElementById('codeInput');
  let currentLink = '';
  let currentPassword = '';

  function setupImageClick(img) {
    img.addEventListener('click', () => {
      currentLink = img.dataset.link;
      currentPassword = img.dataset.password;
      openCodeModal();
    });
  }

  function openCodeModal() {
    modal.style.display = 'flex';
    codeInput.value = '';
    codeInput.focus();

    // Обнуляем обработчик, чтобы не накапливать
    document.getElementById('submitCode').onclick = () => {
      if (codeInput.value === currentPassword) {
        window.location.href = currentLink;
      } else {
        alert('Неверный код!');
      }
    };
  }

  // Инициализация для всех изображений
  document.querySelectorAll('.big-img').forEach(img => {
    setupImageClick(img);
  });
  document.querySelectorAll('.small-img').forEach(img => {
    setupImageClick(img);
  });

  document.getElementById('cancel').onclick = () => {
    modal.style.display = 'none';
  };

  window.onclick = (event) => {
    if (event.target == modal) {
      modal.style.display = 'none';
    }
  };
</script>

</body>
</html>
